name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  schedule:
    - cron: 00 4 * * *

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest # x86
        program:
          - kprobe
          - kretprobe
          - fentry
          - fexit
          - uprobe
          - uretprobe
          - sock_ops
          - socket_filter
          - sk_msg
          - xdp
          - cgroup_skb
          - cgroup_sockopt
          - cgroup_sysctl
          - classifier
          - lsm
          - perf_event
          - raw_tracepoint
          - tp_btf
          - tracepoint
        include:
          - runner: macos-15-intel # x86
            program: kprobe
          - runner: macos-15 # arm64
            program: kprobe
          # Test that crate_name == program_type doesn't cause duplicate symbol errors.
          - runner: ubuntu-latest
            program: uprobe
            crate_name: uprobe
          - runner: ubuntu-latest
            program: uretprobe
            crate_name: uretprobe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy,rust-src,rustfmt

      - uses: dtolnay/rust-toolchain@stable
        if: runner.os == 'macOS' && runner.arch == 'X64'
        with:
          targets: x86_64-unknown-linux-musl

      - uses: dtolnay/rust-toolchain@stable
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        with:
          targets: aarch64-unknown-linux-musl

      - uses: dtolnay/rust-toolchain@stable
        if: runner.os == 'Linux'

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-generate

      - if: runner.os == 'macos'
        run: |
          set -euxo pipefail
          brew update && brew install filosottile/musl-cross/musl-cross llvm
          echo $(brew --prefix llvm)/bin >> $GITHUB_PATH

      - uses: taiki-e/install-action@v2
        with:
          tool: bpf-linker

      - run: sudo apt update && sudo apt install expect
        if: runner.os == 'Linux'

      - run: ./test.sh ${{ github.workspace }} ${{ matrix.program }}
        env:
          CRATE_NAME: ${{ matrix.crate_name }}

  check:
    if: always()
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
